<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Hogar - Dashboard</title>
    <!-- Esto importa los estilos de Tailwind directamente desde internet -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center p-4">

    <main class="bg-white w-full max-w-6xl h-[90vh] rounded-2xl shadow-lg flex overflow-hidden border border-gray-200">
        
        <!-- LADO IZQUIERDO: EL CALENDARIO -->
        <div class="w-1/2 p-8 border-r border-gray-100 flex flex-col">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-gray-800">📅 Noviembre 2024</h2>
                <div class="flex gap-2">
                    <button class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold w-10 h-10 rounded-lg">&lt;</button>
                    <button class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold w-10 h-10 rounded-lg">&gt;</button>
                </div>
            </div>
            
            <!-- Cuadrícula simulada del calendario -->
            <div class="grid grid-cols-7 gap-2 text-center font-semibold text-gray-500 mb-2 text-sm">
                <div>Lun</div><div>Mar</div><div>Mié</div><div>Jue</div><div>Vie</div><div>Sáb</div><div>Dom</div>
            </div>
            <div class="grid grid-cols-7 gap-2 text-center flex-1">
                <!-- Días vacíos -->
                <div></div><div></div><div></div><div></div><div></div>
                <!-- Días del mes (el 15 tiene un puntito rojo de evento) -->
                <div class="py-2 rounded-lg hover:bg-gray-50 cursor-pointer text-gray-400">1</div>
                <div class="py-2 rounded-lg hover:bg-gray-50 cursor-pointer">2</div>
                <div class="py-2 rounded-lg hover:bg-gray-50 cursor-pointer">3</div>
                <div class="py-2 rounded-lg hover:bg-gray-50 cursor-pointer">4</div>
                <div class="py-2 rounded-lg hover:bg-gray-50 cursor-pointer">5</div>
                <div class="py-2 rounded-lg hover:bg-gray-50 cursor-pointer">6</div>
                <div class="py-2 rounded-lg hover:bg-gray-50 cursor-pointer">7</div>
                <div class="py-2 rounded-lg hover:bg-gray-50 cursor-pointer">8</div>
                <div class="py-2 rounded-lg hover:bg-gray-50 cursor-pointer">9</div>
                <div class="py-2 rounded-lg hover:bg-gray-50 cursor-pointer relative">10 <span class="absolute bottom-1 left-1/2 -translate-x-1/2 w-1.5 h-1.5 bg-red-500 rounded-full"></span></div>
                <div class="py-2 rounded-lg hover:bg-gray-50 cursor-pointer">11</div>
                <div class="py-2 rounded-lg hover:bg-gray-50 cursor-pointer">12</div>
                <div class="py-2 rounded-lg hover:bg-gray-50 cursor-pointer">13</div>
                <div class="py-2 rounded-lg hover:bg-gray-50 cursor-pointer">14</div>
                <div class="py-2 rounded-lg bg-blue-600 text-white font-bold cursor-pointer relative">15 <span class="absolute bottom-1 left-1/2 -translate-x-1/2 w-1.5 h-1.5 bg-white rounded-full"></span></div>
                <div class="py-2 rounded-lg hover:bg-gray-50 cursor-pointer">16</div>
                <div class="py-2 rounded-lg hover:bg-gray-50 cursor-pointer">17</div>
                <div class="py-2 rounded-lg hover:bg-gray-50 cursor-pointer relative">18 <span class="absolute bottom-1 left-1/2 -translate-x-1/2 w-1.5 h-1.5 bg-red-500 rounded-full"></span></div>
                <div class="py-2 rounded-lg hover:bg-gray-50 cursor-pointer">19</div>
            </div>
        </div>

        <!-- LADO DERECHO: LA PIZARRA DE PENDIENTES -->
        <div class="w-1/2 p-8 flex flex-col">
            <h2 class="text-2xl font-bold text-gray-800 mb-6">📋 Pendientes (15 Nov)</h2>
            
            <!-- Lista de tareas -->
            <div class="flex-1 space-y-4 overflow-y-auto pr-2">
                <div class="p-4 bg-blue-50 border-l-4 border-blue-500 rounded-r-xl shadow-sm flex justify-between items-center">
                    <div>
                        <p className="font-semibold text-gray-800">Reunión de padres</p>
                        <p className="text-sm text-gray-500 mt-1">🕒 10:00 AM - Escuela</p>
                    </div>
                    <input type="checkbox" className="w-5 h-5 accent-blue-600 cursor-pointer">
                </div>

                <div class="p-4 bg-green-50 border-l-4 border-green-500 rounded-r-xl shadow-sm flex justify-between items-center">
                    <div>
                        <p className="font-semibold text-gray-800">Comprar frutas y verduras</p>
                        <p className="text-sm text-gray-500 mt-1">🛒 Tarea - Supermercado</p>
                    </div>
                    <input type="checkbox" className="w-5 h-5 accent-green-600 cursor-pointer">
                </div>

                <div class="p-4 bg-yellow-50 border-l-4 border-yellow-500 rounded-r-xl shadow-sm flex justify-between items-center">
                    <div>
                        <p className="font-semibold text-gray-800">Pagar recibo de luz</p>
                        <p className="text-sm text-gray-500 mt-1">💰 Antes de las 5:00 PM</p>
                    </div>
                    <input type="checkbox" className="w-5 h-5 accent-yellow-600 cursor-pointer">
                </div>
            </div>

            <!-- Botón para agregar -->
            <button class="mt-6 w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition-colors text-lg shadow-md">
                + Agregar Registro Manual
            </button>
        </div>

    </main>

</body>
</html>
